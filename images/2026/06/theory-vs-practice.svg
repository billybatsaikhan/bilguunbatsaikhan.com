<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="700" height="240" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Theory vs. reality</text>

  <!-- Left: what you see -->
  <text x="160" y="70" text-anchor="middle" font-size="12" font-weight="500" fill="#666">What you can see from outside</text>

  <rect x="40" y="85" width="240" height="28" fill="#fdeaea" stroke="#e0e0e0" rx="3"/>
  <text x="160" y="104" text-anchor="middle" font-size="11" fill="#555">Reporting nobody reads</text>

  <rect x="40" y="117" width="240" height="28" fill="#fdeaea" stroke="#e0e0e0" rx="3"/>
  <text x="160" y="136" text-anchor="middle" font-size="11" fill="#555">Workflows from 5 years ago</text>

  <rect x="40" y="149" width="240" height="28" fill="#fdeaea" stroke="#e0e0e0" rx="3"/>
  <text x="160" y="168" text-anchor="middle" font-size="11" fill="#555">Manual process that could be automated</text>

  <rect x="40" y="181" width="240" height="28" fill="#fdeaea" stroke="#e0e0e0" rx="3"/>
  <text x="160" y="200" text-anchor="middle" font-size="11" fill="#555">Duplicated effort across teams</text>

  <!-- Funnel arrow -->
  <path d="M 310 130 L 370 130" stroke="#999" stroke-width="2" marker-end="url(#a3)"/>
  <text x="340" y="155" text-anchor="middle" font-size="20">&#8594;</text>
  <text x="340" y="175" text-anchor="middle" font-size="10" fill="#666">filter by</text>
  <text x="340" y="188" text-anchor="middle" font-size="10" fill="#666">cost of change</text>

  <!-- Right: what you can ship -->
  <text x="520" y="70" text-anchor="middle" font-size="12" font-weight="500" fill="#666">What you can actually ship</text>

  <rect x="400" y="120" width="240" height="44" fill="#eafaf1" stroke="#27ae60" rx="6" stroke-width="2"/>
  <text x="520" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#27ae60">The one thing with low enough friction</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#999"/>
    </marker>
  </defs>
</svg>
