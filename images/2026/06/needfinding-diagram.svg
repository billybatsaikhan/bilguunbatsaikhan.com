<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="700" height="220" fill="#fafafa" rx="8"/>

  <!-- Left: what they say -->
  <rect x="40" y="30" width="280" height="160" fill="#fff" stroke="#e0e0e0" rx="6"/>
  <text x="180" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#c0392b">What people say they need</text>

  <text x="70" y="90" font-size="12" fill="#555">"A faster report"</text>
  <text x="70" y="115" font-size="12" fill="#555">"More columns in the dashboard"</text>
  <text x="70" y="140" font-size="12" fill="#555">"Automate this email"</text>
  <text x="70" y="165" font-size="11" fill="#999">...descriptions of better workarounds</text>

  <!-- Right: what they actually need -->
  <rect x="380" y="30" width="280" height="160" fill="#fff" stroke="#e0e0e0" rx="6"/>
  <text x="520" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#27ae60">What they actually need</text>

  <text x="410" y="90" font-size="12" fill="#555">"Know if my campaign works before it ends"</text>
  <text x="410" y="115" font-size="12" fill="#555">"Stop second-guessing my decisions"</text>
  <text x="410" y="140" font-size="12" fill="#555">"Not get surprised by bad results"</text>
  <text x="410" y="165" font-size="11" fill="#999">...revealed by watching what they do</text>

  <!-- VS divider -->
  <circle cx="350" cy="110" r="18" fill="#fff" stroke="#ddd"/>
  <text x="350" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#888">vs</text>

  <!-- Bottom annotation -->
  <text x="350" y="210" text-anchor="middle" font-size="11" fill="#666">The gap between these two is where the real opportunity lives</text>
</svg>
